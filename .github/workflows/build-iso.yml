name: Build Custom Glassmorphic ISO

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-iso:
    name: Compile Custom Glassmorphic Archiso
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Update pacman keys and install Archiso
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Sy --noconfirm archlinux-keyring || true
          pacman -Syu --noconfirm || true
          pacman -S --noconfirm --needed archiso git wget curl squashfs-tools xorriso

      - name: Build ISO
        run: |
          chmod +x build-iso.sh
          ./build-iso.sh
          mkdir -p dist
          cp /tmp/archiso-out/*.iso dist/

      - name: Upload Compiled Custom ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BEEOS-Glassmorphic-ISO
          path: dist/*.iso
          retention-days: 7
